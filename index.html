<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Familien Putzplan Zentrale</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@500;700;900&display=swap');

  :root {
    --teal:#1a9e8f; --navy:#1a2e4a; --coral:#ff6b6b;
    --gold:#f9c846; --green:#4caf7d; --lavender:#7c6fcd; --muted:#8899aa;
    --bg:#f5f7ff; --radius:16px; --shadow:0 4px 20px rgba(0,0,0,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--bg);color:#2d3748;padding-bottom:60px;min-height:100vh;}

  .header{background:linear-gradient(135deg,var(--navy),#2a4a7a);color:white;padding:22px 20px;text-align:center;}
  .header h1{font-size:1.5rem;font-weight:900;}
  .header h1 span{color:var(--gold);}
  .header p{font-size:0.85rem;opacity:0.8;margin-top:4px;}
  .section{padding:16px;}
  .section-title{font-size:0.75rem;font-weight:900;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:8px;}

  /* CHILD PICKER CARDS (replaces plain dropdown) */
  .child-picker{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
  .child-card{display:flex;align-items:center;gap:12px;background:white;border-radius:12px;padding:12px 14px;box-shadow:var(--shadow);cursor:pointer;border:2.5px solid transparent;}
  .child-card.selected{border-color:var(--c-color, var(--teal));background:var(--c-bg,#e6f7f5);}
  .child-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;background:var(--c-bg,#eef0f5);}
  .child-info{flex:1;}
  .child-name{font-size:0.95rem;font-weight:800;color:var(--navy);}
  .child-tag{font-size:0.73rem;color:var(--muted);font-weight:700;margin-top:1px;}
  .child-check{width:22px;height:22px;border-radius:50%;border:2.5px solid #dde2ee;flex-shrink:0;}
  .child-card.selected .child-check{background:var(--c-color,var(--teal));border-color:var(--c-color,var(--teal));position:relative;}
  .child-card.selected .child-check::after{content:'✓';position:absolute;color:white;font-size:0.7rem;left:5px;top:1px;}

  .room-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none;}
  .room-tabs::-webkit-scrollbar{display:none;}
  .room-tab{flex-shrink:0;padding:8px 16px;border-radius:99px;border:2px solid #dde2ee;background:white;font-weight:800;color:var(--muted);cursor:pointer;white-space:nowrap;font-family:inherit;font-size:0.85rem;}
  .room-tab.active{border-color:var(--teal);background:var(--teal);color:white;}

  .select-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
  .select-item{background:white;border-radius:12px;padding:12px;display:flex;align-items:center;gap:11px;box-shadow:var(--shadow);cursor:pointer;border:2.5px solid transparent;}
  .select-item.selected{border-color:var(--teal);background:#e6f7f5;}
  .s-num{width:25px;height:25px;border-radius:50%;background:#eef0f5;color:var(--muted);font-size:0.8rem;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .select-item.selected .s-num{color:white;}
  .s-icon{font-size:1.3rem;}
  .s-body{flex:1;min-width:0;}
  .s-title{font-size:0.9rem;font-weight:800;color:var(--navy);}
  .s-sub{font-size:0.75rem;color:var(--muted);font-weight:600;}
  .care-alert{background:#f0ecff;color:var(--lavender);font-size:0.68rem;font-weight:800;padding:4px 9px;border-radius:99px;border:1.5px solid var(--lavender);max-width:170px;word-break:break-word;line-height:1.25;flex-shrink:0;}
  .s-check{width:20px;height:20px;border-radius:50%;border:2px solid #dde2ee;flex-shrink:0;}
  .select-item.selected .s-check{background:var(--teal);border-color:var(--teal);position:relative;}
  .select-item.selected .s-check::after{content:'✓';position:absolute;color:white;font-size:0.75rem;left:4px;top:0px;}

  .send-btn{display:block;width:100%;background:linear-gradient(135deg,#25D366,#128C7E);color:white;border:none;font-family:inherit;font-size:1rem;font-weight:900;padding:15px;border-radius:12px;cursor:pointer;text-align:center;text-decoration:none;box-shadow:0 4px 12px rgba(37,211,102,0.2);}
  .send-btn:disabled{background:#cbd5e0;box-shadow:none;cursor:not-allowed;opacity:0.6;}

  #elternAnsicht,#kinderAnsicht{display:none;}

  /* ============================================================
     KIND-MODUS: GEMEINSAME BASIS
     ============================================================ */
  .kid-header{padding:20px 20px 16px;text-align:center;color:white;}
  .kid-header h1{font-size:1.4rem;font-weight:900;}
  .kid-header p{font-size:0.85rem;opacity:0.85;margin-top:4px;}
  .kid-progress-bg{background:rgba(255,255,255,0.25);border-radius:99px;height:10px;overflow:hidden;margin-top:14px;}
  .kid-progress-fill{height:100%;background:white;border-radius:99px;transition:width 0.4s;width:0%;}
  .kid-progress-text{font-size:0.78rem;font-weight:800;margin-top:6px;opacity:0.9;}
  .kid-home-link{position:absolute;top:14px;left:14px;background:rgba(255,255,255,0.18);color:white;text-decoration:none;font-size:0.78rem;font-weight:800;padding:6px 12px;border-radius:99px;}
  .kid-home-link--icon{font-size:1.3rem;padding:6px 10px;line-height:1;}
  .kid-header{position:relative;}

  /* ---------- TEEN MODE (Noa) ---------- */
  .teen-body{background:#f4f6fa;min-height:100vh;padding-bottom:40px;}
  .teen-header{background:#1a2e4a;}
  .teen-list{padding:14px 16px;display:flex;flex-direction:column;gap:8px;}
  .teen-card{background:white;border-radius:10px;padding:13px 14px;display:flex;align-items:center;gap:12px;border:1.5px solid #e2e6ef;cursor:pointer;transition:background 0.15s;}
  .teen-card.done{background:#f0f4f2;border-color:#cfe3d8;}
  .teen-card.done .teen-title{text-decoration:line-through;color:#9aa5b1;}
  .teen-checkbox{width:20px;height:20px;border-radius:4px;border:2px solid #c5cbd6;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.75rem;color:transparent;}
  .teen-card.done .teen-checkbox{background:#1a9e8f;border-color:#1a9e8f;color:white;}
  .teen-icon{font-size:1.2rem;flex-shrink:0;width:22px;text-align:center;}
  .teen-text{flex:1;min-width:0;}
  .teen-title{font-size:0.92rem;font-weight:700;color:#1a2e4a;}
  .teen-meta{font-size:0.72rem;color:#8899aa;font-weight:600;margin-top:2px;}
  .teen-steps{font-size:0.78rem;color:#6b7785;margin-top:6px;padding-left:0;list-style:none;display:none;}
  .teen-card.expanded .teen-steps{display:block;}
  .teen-steps li{padding:2px 0;}
  .teen-steps li::before{content:'– ';color:#aab4c0;}
  .teen-care{font-size:0.7rem;color:#7c6fcd;background:#f0ecff;padding:2px 8px;border-radius:6px;margin-top:6px;display:inline-block;font-weight:700;}

  /* ---------- FOCUS MODE (Thea) — one task at a time ---------- */
  .focus-body{background:linear-gradient(180deg,#fff5f5,#fff);min-height:100vh;padding-bottom:40px;}
  .focus-header{background:linear-gradient(135deg,#ff6b6b,#ff8787);}
  .focus-stage{padding:24px 20px;}
  .focus-card{background:white;border-radius:20px;box-shadow:0 8px 30px rgba(255,107,107,0.15);padding:28px 22px;text-align:center;}
  .focus-icon{font-size:3.2rem;margin-bottom:10px;}
  .focus-title{font-size:1.25rem;font-weight:900;color:#1a2e4a;margin-bottom:6px;}
  .focus-micro{background:#fff0f0;color:#d65555;font-weight:800;font-size:0.95rem;padding:10px 16px;border-radius:12px;margin:14px 0;}
  .focus-steps{text-align:left;font-size:0.88rem;color:#5a6678;font-weight:600;line-height:1.9;margin:14px 0;padding-left:4px;list-style:none;}
  .focus-steps li{padding-left:22px;position:relative;}
  .focus-steps li::before{content:'→';position:absolute;left:0;color:#ff6b6b;font-weight:900;}
  .focus-time{display:inline-block;background:#eef5ff;color:#4a7aff;font-size:0.78rem;font-weight:800;padding:4px 12px;border-radius:99px;margin-bottom:6px;}
  .focus-go-btn{display:block;width:100%;background:linear-gradient(135deg,#ff6b6b,#ee5a5a);color:white;border:none;font-family:inherit;font-size:1.05rem;font-weight:900;padding:16px;border-radius:14px;margin-top:18px;cursor:pointer;}
  .focus-skip{display:block;width:100%;background:transparent;border:none;color:#aab4c0;font-family:inherit;font-size:0.82rem;font-weight:700;padding:10px;margin-top:6px;cursor:pointer;}
  .focus-dots{display:flex;justify-content:center;gap:6px;margin-top:18px;}
  .focus-dot{width:8px;height:8px;border-radius:50%;background:#ffd6d6;}
  .focus-dot.done{background:#ff6b6b;}
  .focus-care{font-size:0.75rem;color:#7c6fcd;background:#f0ecff;padding:6px 10px;border-radius:8px;margin-top:12px;font-weight:700;}

  /* ---------- STAR MODE (Jakob) ---------- */
  .star-body{background:linear-gradient(180deg,#eaf2ff,#fff);min-height:100vh;padding-bottom:40px;font-family:'Quicksand',sans-serif;}
  .star-header{background:linear-gradient(135deg,#4a7aff,#6e95ff);}
  .star-collection{display:flex;justify-content:center;gap:6px;padding:14px 16px 0;flex-wrap:wrap;}
  .star-slot{width:34px;height:34px;border-radius:50%;background:#eef0f5;display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:transform 0.3s;}
  .star-slot.filled{background:#fff8e1;transform:scale(1.15);}
  .star-stage{padding:20px;}
  .star-card{background:white;border-radius:24px;box-shadow:0 8px 28px rgba(74,122,255,0.18);padding:30px 20px;text-align:center;}
  .star-icon{font-size:4.5rem;margin-bottom:8px;}
  .star-title{font-size:1.4rem;font-weight:900;color:#1a2e4a;}
  .star-micro{font-size:1.1rem;font-weight:800;color:#4a7aff;margin-top:10px;}
  .star-btn{display:block;width:100%;background:linear-gradient(135deg,#4a7aff,#3a63e0);color:white;border:none;font-family:'Quicksand',sans-serif;font-size:1.2rem;font-weight:900;padding:18px;border-radius:16px;margin-top:20px;cursor:pointer;}
  .star-burst{position:fixed;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;font-size:5rem;opacity:0;z-index:200;}
  .star-burst.show{animation:starpop 0.7s ease-out;}
  @keyframes starpop{0%{opacity:0;transform:scale(0.3);}40%{opacity:1;transform:scale(1.3);}100%{opacity:0;transform:scale(1.6);}}

  /* ---------- MINI MODE (Lioba) ---------- */
  .mini-body{background:linear-gradient(180deg,#fffbe8,#fff);min-height:100vh;display:flex;flex-direction:column;font-family:'Quicksand',sans-serif;}
  .mini-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center;}
  .mini-icon{font-size:7rem;margin-bottom:18px;}
  .mini-title{font-size:1.6rem;font-weight:900;color:#1a2e4a;margin-bottom:24px;}
  .mini-btn{background:linear-gradient(135deg,#f9c846,#f7b733);border:none;color:#1a2e4a;font-family:'Quicksand',sans-serif;font-size:1.3rem;font-weight:900;padding:24px 48px;border-radius:99px;box-shadow:0 8px 24px rgba(249,200,70,0.4);cursor:pointer;}
  .mini-done{display:none;flex-direction:column;align-items:center;}
  .mini-done.show{display:flex;}
  .mini-confetti{font-size:5rem;}
</style>
</head>
<body>

<!-- ================= ELTERN BEREICH ================= -->
<div id="elternAnsicht">
  <div class="header">
    <h1>🛠️ Putzplan <span>Familien-Zentrale</span></h1>
    <p>Kind, Raum & Aufgaben wählen – jedes Kind bekommt seinen eigenen Modus</p>
  </div>
  <div class="section">

    <div class="section-title">1. Für wen ist der Plan?</div>
    <div class="child-picker" id="childPicker"></div>

    <div class="section-title">2. Welcher Raum steht an?</div>
    <div class="room-tabs" id="roomTabs"></div>

    <div class="section-title">3. Aufgaben festlegen</div>
    <div class="select-grid" id="selectGrid"></div>

    <button id="whatsappBtn" class="send-btn" onclick="sendToWhatsApp()" disabled>
      🚀 Persönlichen Plan via WhatsApp senden
    </button>
  </div>
</div>

<!-- ================= KINDER BEREICH (4 separate Modi werden hier injiziert) ================= -->
<div id="kinderAnsicht"></div>

<script>

let currentChild = null;
let currentRoom = 'kueche';
let selectedTasks = new Set();

/* ============================================================
   INIT / ROUTING
   ============================================================ */
function init() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('mode') === 'child') {
    renderChildView(params);
  } else {
    document.getElementById('elternAnsicht').style.display = 'block';
    buildChildPicker();
    buildRoomTabs();
    buildElternGrid();
  }
}

/* ============================================================
   ELTERN: Kind-Auswahl
   ============================================================ */
function buildChildPicker() {
  const wrap = document.getElementById('childPicker');
  wrap.innerHTML = '';
  Object.keys(CHILDREN).forEach(key => {
    const c = CHILDREN[key];
    const el = document.createElement('div');
    el.className = 'child-card' + (currentChild === key ? ' selected' : '');
    el.style.setProperty('--c-color', c.color);
    el.style.setProperty('--c-bg', c.bg);
    el.onclick = () => { currentChild = key; buildChildPicker(); validateEltern(); };
    el.innerHTML = `
      <div class="child-avatar" style="background:${c.bg};">${c.icon}</div>
      <div class="child-info">
        <div class="child-name">${c.name} <span style="font-weight:600;color:var(--muted);">· ${c.age} J.</span></div>
        <div class="child-tag">${c.tag}</div>
      </div>
      <div class="child-check"></div>`;
    wrap.appendChild(el);
  });
}

/* ============================================================
   ELTERN: Raum-Tabs
   ============================================================ */
function buildRoomTabs() {
  const container = document.getElementById('roomTabs');
  container.innerHTML = '';
  Object.keys(DATA).forEach(key => {
    const btn = document.createElement('button');
    btn.className = `room-tab ${key === currentRoom ? 'active' : ''}`;
    btn.innerText = `${DATA[key].icon} ${DATA[key].name}`;
    btn.onclick = () => {
      currentRoom = key;
      selectedTasks.clear();
      buildRoomTabs();
      buildElternGrid();
      validateEltern();
    };
    container.appendChild(btn);
  });
}

/* ============================================================
   ELTERN: Aufgaben-Auswahl
   ============================================================ */
function buildElternGrid() {
  const grid = document.getElementById('selectGrid');
  grid.innerHTML = '';
  DATA[currentRoom].tasks.forEach(t => {
    const el = document.createElement('div');
    el.className = 'select-item' + (selectedTasks.has(t.id) ? ' selected' : '');
    el.onclick = () => {
      if (selectedTasks.has(t.id)) selectedTasks.delete(t.id);
      else selectedTasks.add(t.id);
      buildElternGrid();
      validateEltern();
    };
    let energyColor = t.energy === 'Aufwärmen' ? 'var(--green)' : (t.energy === 'Hauptteil' ? 'var(--gold)' : 'var(--coral)');
    el.innerHTML = `
      <div class="s-num" style="background:${energyColor};">★</div>
      <div class="s-icon">${t.icon}</div>
      <div class="s-body">
        <div class="s-title">${t.title}</div>
        <div class="s-sub">⏱ ${t.time} · <span style="color:${energyColor};font-weight:bold;">${t.energy}</span></div>
      </div>
      ${t.careAlert ? `<div class="care-alert">💡 ${t.careAlert}</div>` : ''}
      <div class="s-check"></div>`;
    grid.appendChild(el);
  });
}

function validateEltern() {
  document.getElementById('whatsappBtn').disabled = !(currentChild && selectedTasks.size > 0);
}

function sendToWhatsApp() {
  const c = CHILDREN[currentChild];
  const taskIds = Array.from(selectedTasks).join(',');
  const localPath = window.location.href.split('?')[0];
  const childLink = `${localPath}?mode=child&child=${currentChild}&room=${currentRoom}&tasks=${taskIds}`;

  const greetings = {
    teen: `Hey ${c.name}, hier ist dein Plan für ${DATA[currentRoom].name}. Tippe auf den Link, alles ist wie immer aufgebaut:`,
    focus: `Hi ${c.name}! 🌟 Dein Plan für ${DATA[currentRoom].name} wartet. Tipp: öffne ihn gleich, dann ist der schwerste Teil schon geschafft!`,
    star: `Hallo ${c.name}! ⭐ Eine Sterne-Mission wartet im ${DATA[currentRoom].name}! Tipp auf den Link und sammle Sterne:`,
    mini: `Kleine Heldin gesucht! 💛 Tipp auf den Link für deine Mini-Aufgabe:`
  };

  const message = `${greetings[c.mode]}\n\n🔗 ${childLink}\n\nDu schaffst das! 🏆`;
  window.location.href = `https://api.whatsapp.com/send?text=${encodeURIComponent(message)}`;
}

init();

/* ============================================================
   KINDER-ANSICHT: ROUTER
   ============================================================ */
function getHomeLink() {
  return window.location.href.split('?')[0];
}

function renderChildView(params) {
  const childKey = params.get('child');
  const roomKey = params.get('room');
  const taskIds = (params.get('tasks') || '').split(',').map(Number);
  const c = CHILDREN[childKey];
  const room = DATA[roomKey] || DATA.kueche;
  const tasks = room.tasks.filter(t => taskIds.includes(t.id));

  const container = document.getElementById('kinderAnsicht');
  container.style.display = 'block';

  if (c.mode === 'teen')  renderTeenMode(container, c, room, tasks);
  if (c.mode === 'focus') renderFocusMode(container, c, room, tasks);
  if (c.mode === 'star')  renderStarMode(container, c, room, tasks);
  if (c.mode === 'mini')  renderMiniMode(container, c, room, tasks);
}

/* ============================================================
   MODUS 1 — NOA (16, ASS+ADHS): nüchtern, volle Übersicht,
   keine Spielereien, alle Aufgaben sofort sichtbar & klickbar
   ============================================================ */
function renderTeenMode(container, c, room, tasks) {
  const total = tasks.length;
  container.innerHTML = `
    <div class="teen-body">
      <div class="kid-header teen-header">
        <a href="${getHomeLink()}" class="kid-home-link">🏠 Start</a>
        <h1>${room.icon} ${room.name}</h1>
        <p>Liste · ${total} Aufgaben</p>
        <div class="kid-progress-bg"><div class="kid-progress-fill" id="prog"></div></div>
        <div class="kid-progress-text" id="progText">0 / ${total} erledigt</div>
      </div>
      <div class="teen-list" id="teenList"></div>
    </div>`;

  const list = document.getElementById('teenList');
  tasks.forEach(t => {
    const card = document.createElement('div');
    card.className = 'teen-card';
    card.innerHTML = `
      <div class="teen-checkbox">✓</div>
      <div class="teen-icon">${t.icon}</div>
      <div class="teen-text">
        <div class="teen-title">${t.title}</div>
        <div class="teen-meta">${t.time} · ${t.energy}</div>
        <ul class="teen-steps">${t.steps.map(s => `<li>${s}</li>`).join('')}</ul>
        ${t.careAlert ? `<div class="teen-care">${t.careAlert}</div>` : ''}
      </div>`;
    card.querySelector('.teen-checkbox').onclick = (e) => {
      e.stopPropagation();
      card.classList.toggle('done');
      updateTeenProgress(total);
    };
    card.querySelector('.teen-text').onclick = () => card.classList.toggle('expanded');
    list.appendChild(card);
  });
}

function updateTeenProgress(total) {
  const done = document.querySelectorAll('.teen-card.done').length;
  document.getElementById('prog').style.width = (done / total * 100) + '%';
  document.getElementById('progText').textContent = `${done} / ${total} erledigt`;
}

/* ============================================================
   MODUS 2 — THEA (13, ADHS, Start-Hürde): EINE Aufgabe auf
   einmal, großer "Los geht's"-Button senkt Einstiegshürde
   ============================================================ */
function renderFocusMode(container, c, room, tasks) {
  let idx = 0;
  let firstTaskStarted = false; // only the very first task needs the barrier-breaking tap
  const total = tasks.length;

  container.innerHTML = `
    <div class="focus-body">
      <div class="kid-header focus-header">
        <a href="${getHomeLink()}" class="kid-home-link">🏠 Start</a>
        <h1>${room.icon} ${room.name}</h1>
        <p>Hi ${c.name}! Eine Aufgabe nach der anderen 🌟</p>
        <div class="kid-progress-bg"><div class="kid-progress-fill" id="prog"></div></div>
        <div class="kid-progress-text" id="progText">0 / ${total} geschafft</div>
      </div>
      <div class="focus-stage" id="stage"></div>
    </div>`;

  function renderStage() {
    const stage = document.getElementById('stage');
    if (idx >= total) {
      stage.innerHTML = `
        <div class="focus-card">
          <div class="focus-icon">🎉</div>
          <div class="focus-title">Alles geschafft, ${c.name}!</div>
          <p style="color:#8899aa;font-weight:600;margin-top:6px;">Du hast wirklich dran gedacht – mega! 💪</p>
        </div>`;
      return;
    }
    const t = tasks[idx];
    const isFirstTask = idx === 0 && !firstTaskStarted;

    if (isFirstTask) {
      // BARRIER-BREAKING SCREEN — only ever shown once, for the very first task
      stage.innerHTML = `
        <div class="focus-card">
          <div class="focus-time">⏱ ${t.time}</div>
          <div class="focus-icon">${t.icon}</div>
          <div class="focus-title">${t.title}</div>
          <div class="focus-micro" id="microBox">👉 Erster Schritt: ${t.microStep}</div>
          ${t.careAlert ? `<div class="focus-care">💡 ${t.careAlert}</div>` : ''}
          <button class="focus-go-btn" id="goBtn">Los geht's! 🚀</button>
          <button class="focus-skip" id="skipBtn">Diese Aufgabe später</button>
          <div class="focus-dots">${tasks.map((_, i) => `<div class="focus-dot ${i < idx ? 'done' : ''}"></div>`).join('')}</div>
        </div>`;
      document.getElementById('goBtn').onclick = () => {
        firstTaskStarted = true;
        renderStage(); // re-render same task, now showing full steps + Fertig-button directly
      };
      document.getElementById('skipBtn').onclick = () => {
        tasks.push(tasks.splice(idx, 1)[0]);
        renderStage();
      };
    } else {
      // FLOW SCREEN — steps already visible, single "Fertig" tap moves straight to next task
      stage.innerHTML = `
        <div class="focus-card">
          <div class="focus-time">⏱ ${t.time}</div>
          <div class="focus-icon">${t.icon}</div>
          <div class="focus-title">${t.title}</div>
          <ul class="focus-steps">${t.steps.map(s => `<li>${s}</li>`).join('')}</ul>
          ${t.careAlert ? `<div class="focus-care">💡 ${t.careAlert}</div>` : ''}
          <button class="focus-go-btn" id="goBtn">Fertig! ✅</button>
          <button class="focus-skip" id="skipBtn">Diese Aufgabe später</button>
          <div class="focus-dots">${tasks.map((_, i) => `<div class="focus-dot ${i < idx ? 'done' : ''}"></div>`).join('')}</div>
        </div>`;
      document.getElementById('goBtn').onclick = () => {
        idx++;
        updateFocusProgress();
        renderStage(); // moves straight on — no repeated "Los geht's" barrier
      };
      document.getElementById('skipBtn').onclick = () => {
        tasks.push(tasks.splice(idx, 1)[0]);
        renderStage();
      };
    }
  }

  function updateFocusProgress() {
    document.getElementById('prog').style.width = (idx / total * 100) + '%';
    document.getElementById('progText').textContent = `${idx} / ${total} geschafft`;
  }

  renderStage();
}

/* ============================================================
   MODUS 3 — JAKOB (6, ADHS, weint leicht): riesige Icons,
   Mikro-Schritte, sofortiges Stern-Feedback nach jedem Tipp
   ============================================================ */
function renderStarMode(container, c, room, tasks) {
  let idx = 0;
  const total = tasks.length;

  container.innerHTML = `
    <div class="star-body">
      <div class="kid-header star-header">
        <a href="${getHomeLink()}" class="kid-home-link kid-home-link--icon">🏠</a>
        <h1>⭐ ${room.name}-Mission</h1>
        <p>Sammle Sterne, ${c.name}!</p>
      </div>
      <div class="star-collection" id="starCollection"></div>
      <div class="star-stage" id="stage"></div>
      <div class="star-burst" id="burst">⭐</div>
    </div>`;

  const collection = document.getElementById('starCollection');
  for (let i = 0; i < total; i++) {
    const slot = document.createElement('div');
    slot.className = 'star-slot';
    slot.id = 'slot-' + i;
    slot.textContent = '☆';
    collection.appendChild(slot);
  }

  function renderStage() {
    const stage = document.getElementById('stage');
    if (idx >= total) {
      stage.innerHTML = `
        <div class="star-card">
          <div class="star-icon">🏆</div>
          <div class="star-title">Super gemacht, ${c.name}!</div>
          <div class="star-micro">Du hast alle Sterne gesammelt! ⭐⭐⭐</div>
        </div>`;
      return;
    }
    const t = tasks[idx];
    stage.innerHTML = `
      <div class="star-card">
        <div class="star-icon">${t.icon}</div>
        <div class="star-title">${t.title}</div>
        <div class="star-micro">${t.microStep}</div>
        <button class="star-btn" id="doneBtn">Geschafft! ⭐</button>
      </div>`;
    document.getElementById('doneBtn').onclick = () => {
      const slot = document.getElementById('slot-' + idx);
      slot.textContent = '⭐';
      slot.classList.add('filled');
      const burst = document.getElementById('burst');
      burst.classList.remove('show');
      void burst.offsetWidth;
      burst.classList.add('show');
      idx++;
      setTimeout(renderStage, 450);
    };
  }
  renderStage();
}

/* ============================================================
   MODUS 4 — LIOBA (3): ein Bild, ein Knopf, ein Erfolg
   ============================================================ */
function renderMiniMode(container, c, room, tasks) {
  const t = tasks[0] || { icon: '🧽', title: 'Mithelfen', microStep: 'Leg den Lappen in die Spüle.' };
  container.innerHTML = `
    <div class="mini-body">
      <div class="mini-stage">
        <div id="miniTask">
          <div class="mini-icon">${t.icon}</div>
          <div class="mini-title">${t.microStep || t.title}</div>
          <button class="mini-btn" id="miniBtn">Geschafft! 🎉</button>
        </div>
        <div class="mini-done" id="miniDone">
          <div class="mini-confetti">🎊</div>
          <div class="mini-title">Toll gemacht, ${c.name}!</div>
        </div>
      </div>
    </div>`;
  document.getElementById('miniBtn').onclick = () => {
    document.getElementById('miniTask').style.display = 'none';
    document.getElementById('miniDone').classList.add('show');
  };
}
</script>
